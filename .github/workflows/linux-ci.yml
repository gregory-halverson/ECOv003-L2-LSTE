name: Linux CI

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened

jobs:
  build-and-test:
    name: Build And Test (Ubuntu)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup micromamba
        uses: mamba-org/setup-micromamba@v2
        with:
          environment-name: ECOv003-L2-LSTE
          create-args: >-
            -c conda-forge
            hdf4
            hdf5
            libxml2
            eccodes
            pkg-config
            expat
            libjpeg-turbo
            zlib
            make
            gcc

      - name: Compile test
        run: |
          micromamba run -n ECOv003-L2-LSTE make clean
          micromamba run -n ECOv003-L2-LSTE make test
