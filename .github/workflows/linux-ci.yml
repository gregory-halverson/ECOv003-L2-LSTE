name: Linux CI

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened

jobs:
  build-and-test:
    name: Build And Test (Ubuntu)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            pkg-config \
            libhdf4-dev \
            libhdf5-dev \
            libxml2-dev \
            libeccodes-dev \
            libexpat1-dev \
            libjpeg-dev \
            zlib1g-dev

      - name: Compile test
        run: |
          make clean
          make test
